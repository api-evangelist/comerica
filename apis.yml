description: >-
  Comerica Incorporated is a Texas-headquartered financial services holding
  company providing retail, commercial, and wealth-management banking across
  the United States. As of April 2026, Comerica does not publish a public
  developer API portal. Customer banking data flows for fintech integrations
  are reached indirectly through US open-banking aggregators (Plaid, Tink,
  TrueLayer, MX) and through emerging Financial Data Exchange (FDX) APIs
  required under CFPB Section 1033 once the rule is no longer subject to
  judicial stay. Internal commercial APIs (treasury management, cash
  positioning, ACH initiation) are available to customers under direct
  contract through Comerica Treasury Management, but are not publicly
  documented.
